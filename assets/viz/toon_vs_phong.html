<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toon vs Phong</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0d0c0a; overflow: hidden; font-family: monospace; }

#wrap { width: 100%; height: 100%; display: flex; flex-direction: column; background: #0d0c0a; }

#scene-area {
  flex: 1; position: relative; min-height: 0;
  cursor: grab;
}
#scene-area:active { cursor: grabbing; }
canvas { display: block; touch-action: none; }

.label {
  position: absolute;
  top: 24px;
  color: #e8c080;
  font-size: 18px;
  font-weight: bold;
  pointer-events: none;
  transform: translateX(-50%);
  letter-spacing: 1px;
}
#label-left  { left: 25%; }
#label-right { left: 75%; }

#divider {
  position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 1px;
  background: #2a2520;
  pointer-events: none;
}

#hud {
  display: flex;
  height: 78px;
  border-top: 1px solid #1e1a14;
  background: #12110e;
}

.slider-block {
  flex: 1;
  padding: 18px 30px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  font-size: 14px;
  color: #c8bba8;
}
.slider-block:first-child {
  border-right: 1px solid #1e1a14;
}
.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.slider-label { font-weight: bold; }
.slider-val {
  color: #d4a855;
  font-variant-numeric: tabular-nums;
}
.slider-block input[type="range"] {
  width: 100%;
  accent-color: #c8894a;
  cursor: pointer;
}

#hint {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  color: #4a3a2a;
  font-size: 12px;
  pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="scene-area">
    <span class="label" id="label-left">Phong</span>
    <span class="label" id="label-right">Toon</span>
    <div id="divider"></div>
    <span id="hint">drag to orbit · scroll to zoom</span>
  </div>
  <div id="hud">
    <div class="slider-block">
      <div class="slider-header">
        <span class="slider-label">shininess</span>
        <span class="slider-val" id="shVal">32</span>
      </div>
      <input type="range" id="shSlider" min="2" max="128" step="1" value="32">
    </div>
    <div class="slider-block">
      <div class="slider-header">
        <span class="slider-label">toon levels</span>
        <span class="slider-val" id="lvVal">4</span>
      </div>
      <input type="range" id="lvSlider" min="2" max="8" step="1" value="4">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const sceneArea = document.getElementById('scene-area');
const $ = id => document.getElementById(id);

/* ── Three.js setup ─────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d0c0a);
sceneArea.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);

/* ── Light ──────────────────────────────────────────── */
const lightPos = new THREE.Vector3(1.5, 1.5, 2.0);

const lightMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 20, 16),
  new THREE.MeshBasicMaterial({ color: 0xffe090 })
);
lightMarker.position.copy(lightPos);
scene.add(lightMarker);

const halo = new THREE.Mesh(
  new THREE.SphereGeometry(0.16, 20, 16),
  new THREE.MeshBasicMaterial({ color: 0xffe090, transparent: true, opacity: 0.22 })
);
halo.position.copy(lightPos);
scene.add(halo);

/* ── Shared uniforms for both shaders ───────────────── */
const sharedUniforms = {
  Ka:         { value: 0.10 },
  Kd:         { value: 0.70 },
  Ks:         { value: 0.55 },
  shininess:  { value: 32 },
  levels:     { value: 4 },
  lightPos:   { value: lightPos.clone() },
  baseColor:  { value: new THREE.Color(0xd49050) },
  lightColor: { value: new THREE.Color(0xfff0d0) },
  viewPos:    { value: new THREE.Vector3() }
};

const vertexShader = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  void main() {
    vec4 wp   = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    vNormal   = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;

/* ── Phong (smooth) ─────────────────────────────────── */
const phongMat = new THREE.ShaderMaterial({
  uniforms: sharedUniforms,
  vertexShader,
  fragmentShader: `
    uniform float Ka, Kd, Ks, shininess;
    uniform vec3  lightPos, baseColor, lightColor, viewPos;

    varying vec3 vNormal;
    varying vec3 vWorldPos;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 L = normalize(lightPos - vWorldPos);
      vec3 V = normalize(viewPos  - vWorldPos);
      vec3 R = reflect(-L, N);

      float ndotl = max(dot(N, L), 0.0);
      float rdotv = max(dot(R, V), 0.0);

      vec3 ambient  = Ka * baseColor;
      vec3 diffuse  = Kd * ndotl * baseColor * lightColor;
      vec3 specular = Ks * pow(rdotv, shininess) * lightColor * step(0.001, ndotl);

      gl_FragColor = vec4(ambient + diffuse + specular, 1.0);
    }
  `
});

/* ── Toon (quantized diffuse, binary specular) ──────── */
const toonMat = new THREE.ShaderMaterial({
  uniforms: sharedUniforms,
  vertexShader,
  fragmentShader: `
    uniform float Ka, Kd, Ks, shininess, levels;
    uniform vec3  lightPos, baseColor, lightColor, viewPos;

    varying vec3 vNormal;
    varying vec3 vWorldPos;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 L = normalize(lightPos - vWorldPos);
      vec3 V = normalize(viewPos  - vWorldPos);
      vec3 R = reflect(-L, N);

      float ndotl = max(dot(N, L), 0.0);
      // Quantize ndotl into discrete bands, stretched to fill [0, 1]
      float quantized = clamp(
        floor(ndotl * levels) / max(levels - 1.0, 1.0),
        0.0, 1.0
      );

      float rdotv = max(dot(R, V), 0.0);
      // Hard cutoff: spec is on where smooth Phong spec would exceed 0.5
      float specCel = step(0.5, pow(rdotv, shininess));

      vec3 ambient  = Ka * baseColor;
      vec3 diffuse  = Kd * quantized * baseColor * lightColor;
      vec3 specular = Ks * specCel * lightColor * step(0.001, ndotl);

      gl_FragColor = vec4(ambient + diffuse + specular, 1.0);
    }
  `
});

/* ── Sphere + outline for toon ──────────────────────── */
const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
const sphere    = new THREE.Mesh(sphereGeo, phongMat);
scene.add(sphere);

// Cel-shading outline: slightly enlarged sphere, back-face only, black
const outline = new THREE.Mesh(
  sphereGeo,
  new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide })
);
outline.scale.setScalar(1.04);
scene.add(outline);

/* ── Orbit camera ───────────────────────────────────── */
let theta = 0.5, phi = 0.35, radius = 4.5;
function updateCamera() {
  camera.position.set(
    radius * Math.cos(phi) * Math.sin(theta),
    radius * Math.sin(phi),
    radius * Math.cos(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
  sharedUniforms.viewPos.value.copy(camera.position);
}

function resize() {
  const w = sceneArea.offsetWidth, h = sceneArea.offsetHeight;
  renderer.setSize(w, h);
  // Each viewport is half the width
  camera.aspect = (w / 2) / h;
  camera.updateProjectionMatrix();
}
resize();
updateCamera();

/* ── Drag / touch / wheel ───────────────────────────── */
let drag = false;
let startX = 0, startY = 0, startTheta = 0, startPhi = 0;
function beginDrag(x, y) {
  drag = true;
  startX = x; startY = y;
  startTheta = theta; startPhi = phi;
}
function updateDrag(x, y) {
  if (!drag) return;
  theta = startTheta - (x - startX) * 0.0035;
  phi   = Math.max(-0.4, Math.min(1.3, startPhi + (y - startY) * 0.0035));
  updateCamera();
}
function endDrag() { drag = false; }

sceneArea.addEventListener('mousedown', e => {
  beginDrag(e.clientX, e.clientY);
  e.preventDefault();
});
window.addEventListener('mouseup', endDrag);
window.addEventListener('mousemove', e => updateDrag(e.clientX, e.clientY));

sceneArea.addEventListener('touchstart', e => {
  if (e.touches.length === 0) return;
  beginDrag(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });
sceneArea.addEventListener('touchmove', e => {
  if (e.touches.length === 0) return;
  updateDrag(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });
sceneArea.addEventListener('touchend', endDrag);
sceneArea.addEventListener('touchcancel', endDrag);

sceneArea.addEventListener('wheel', e => {
  radius = Math.max(2.5, Math.min(12, radius + e.deltaY * 0.005));
  updateCamera();
  e.preventDefault();
}, { passive: false });

/* ── Sliders ────────────────────────────────────────── */
$('shSlider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  sharedUniforms.shininess.value = v;
  $('shVal').textContent = Math.round(v);
});
$('lvSlider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  sharedUniforms.levels.value = v;
  $('lvVal').textContent = Math.round(v);
});

/* ── Split render: Phong left, Toon right ───────────── */
function render() {
  const w = sceneArea.offsetWidth, h = sceneArea.offsetHeight;
  const halfW = Math.floor(w / 2);

  renderer.setScissorTest(true);

  // Left half: Phong (no outline)
  outline.visible = false;
  sphere.material = phongMat;
  renderer.setScissor(0, 0, halfW, h);
  renderer.setViewport(0, 0, halfW, h);
  renderer.render(scene, camera);

  // Right half: Toon (with outline)
  outline.visible = true;
  sphere.material = toonMat;
  renderer.setScissor(halfW, 0, w - halfW, h);
  renderer.setViewport(halfW, 0, w - halfW, h);
  renderer.render(scene, camera);

  renderer.setScissorTest(false);
}

function animate() {
  requestAnimationFrame(animate);
  render();
}
animate();

window.addEventListener('resize', resize);
</script>
</body>
</html>
