<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#12110e"/>

  <!-- Back edges FIRST (drawn below) -->
  <line x1="16" y1="16" x2="27" y2="10" stroke="#4a4030" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="5"  y2="10" stroke="#4a4030" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="16" y2="28" stroke="#4a4030" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Front edges ON TOP -->
