<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phong Shading</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0d0c0a; overflow: hidden; font-family: monospace; }

#wrap { width: 100%; height: 100%; display: flex; background: #0d0c0a; }

#left-panel {
  width: 280px; flex-shrink: 0;
  padding: 32px 26px;
  display: flex; flex-direction: column; gap: 22px;
  border-right: 1px solid #1e1a14;
}

#scene-area {
  flex: 1; position: relative; min-width: 0;
  cursor: grab;
}
#scene-area:active { cursor: grabbing; }
canvas { display: block; touch-action: none; }

.slider-row {
  display: flex; flex-direction: column; gap: 6px;
  font-size: 13px; color: #c8bba8;
}
.slider-header {
  display: flex; justify-content: space-between; align-items: baseline;
}
.slider-label { font-weight: bold; }
.slider-val {
  color: #d4a855;
  font-variant-numeric: tabular-nums;
}
.slider-row input[type="range"] {
  width: 100%; accent-color: #c8894a; cursor: pointer;
}

#hint {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  color: #4a3a2a; font-size: 12px; pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>
<div id="wrap">

  <div id="left-panel">
    <label class="slider-row">
      <div class="slider-header"><span class="slider-label">Ka</span><span class="slider-val" id="kaVal">0.10</span></div>
      <input type="range" id="kaSlider" min="0" max="1" step="0.01" value="0.10">
    </label>
    <label class="slider-row">
      <div class="slider-header"><span class="slider-label">Kd</span><span class="slider-val" id="kdVal">0.70</span></div>
      <input type="range" id="kdSlider" min="0" max="1" step="0.01" value="0.70">
    </label>
    <label class="slider-row">
      <div class="slider-header"><span class="slider-label">Ks</span><span class="slider-val" id="ksVal">0.55</span></div>
      <input type="range" id="ksSlider" min="0" max="1" step="0.01" value="0.55">
    </label>
    <label class="slider-row">
      <div class="slider-header"><span class="slider-label">shininess</span><span class="slider-val" id="shVal">32</span></div>
      <input type="range" id="shSlider" min="1" max="128" step="1" value="32">
    </label>
  </div>

  <div id="scene-area">
    <span id="hint">drag to orbit · scroll to zoom</span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const sceneArea = document.getElementById('scene-area');
const $ = id => document.getElementById(id);

/* ── Three.js setup ─────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(sceneArea.offsetWidth, sceneArea.offsetHeight);
renderer.setClearColor(0x0d0c0a);
sceneArea.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, sceneArea.offsetWidth / sceneArea.offsetHeight, 0.1, 100);

/* ── Light position (fixed in world space) ──────────── */
const lightPos = new THREE.Vector3(1.5, 1.5, 2.0);

// Visible light marker
const lightMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 20, 16),
  new THREE.MeshBasicMaterial({ color: 0xffe090 })
);
lightMarker.position.copy(lightPos);
scene.add(lightMarker);

// Soft halo
const halo = new THREE.Mesh(
  new THREE.SphereGeometry(0.16, 20, 16),
  new THREE.MeshBasicMaterial({ color: 0xffe090, transparent: true, opacity: 0.22 })
);
halo.position.copy(lightPos);
scene.add(halo);

/* ── Phong shader ───────────────────────────────────── */
const phongUniforms = {
  Ka:         { value: 0.10 },
  Kd:         { value: 0.70 },
  Ks:         { value: 0.55 },
  shininess:  { value: 32 },
  lightPos:   { value: lightPos.clone() },
  baseColor:  { value: new THREE.Color(0xd49050) },
  lightColor: { value: new THREE.Color(0xfff0d0) },
  viewPos:    { value: new THREE.Vector3() }
};

const phongMaterial = new THREE.ShaderMaterial({
  uniforms: phongUniforms,
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      vNormal   = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform float Ka;
    uniform float Kd;
    uniform float Ks;
    uniform float shininess;
    uniform vec3  lightPos;
    uniform vec3  baseColor;
    uniform vec3  lightColor;
    uniform vec3  viewPos;

    varying vec3 vNormal;
    varying vec3 vWorldPos;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 L = normalize(lightPos - vWorldPos);
      vec3 V = normalize(viewPos - vWorldPos);
      vec3 R = reflect(-L, N);

      float ndotl    = max(dot(N, L), 0.0);
      float rdotv    = max(dot(R, V), 0.0);

      vec3  ambient  = Ka * baseColor;
      vec3  diffuse  = Kd * ndotl * baseColor * lightColor;
      vec3  specular = Ks * pow(rdotv, shininess) * lightColor * step(0.001, ndotl);

      gl_FragColor = vec4(ambient + diffuse + specular, 1.0);
    }
  `
});

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  phongMaterial
);
scene.add(sphere);

/* ── Orbit camera ───────────────────────────────────── */
let theta = 0.5, phi = 0.35, radius = 4.5;
function updateCamera() {
  camera.position.set(
    radius * Math.cos(phi) * Math.sin(theta),
    radius * Math.sin(phi),
    radius * Math.cos(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
  camera.aspect = sceneArea.offsetWidth / sceneArea.offsetHeight;
  camera.updateProjectionMatrix();
  phongUniforms.viewPos.value.copy(camera.position);
}
updateCamera();

let drag = false;
let startX = 0, startY = 0, startTheta = 0, startPhi = 0;

function beginDrag(x, y) {
  drag = true;
  startX = x; startY = y;
  startTheta = theta; startPhi = phi;
}
function updateDrag(x, y) {
  if (!drag) return;
  theta = startTheta - (x - startX) * 0.0035;
  phi = Math.max(-0.4, Math.min(1.3, startPhi + (y - startY) * 0.0035));
  updateCamera();
}
function endDrag() { drag = false; }

sceneArea.addEventListener('mousedown', e => {
  beginDrag(e.clientX, e.clientY);
  e.preventDefault();
});
window.addEventListener('mouseup', endDrag);
window.addEventListener('mousemove', e => updateDrag(e.clientX, e.clientY));

sceneArea.addEventListener('touchstart', e => {
  if (e.touches.length === 0) return;
  beginDrag(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });
sceneArea.addEventListener('touchmove', e => {
  if (e.touches.length === 0) return;
  updateDrag(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });
sceneArea.addEventListener('touchend', endDrag);
sceneArea.addEventListener('touchcancel', endDrag);

sceneArea.addEventListener('wheel', e => {
  radius = Math.max(2.5, Math.min(12, radius + e.deltaY * 0.005));
  updateCamera();
  e.preventDefault();
}, { passive: false });

/* ── Sliders ────────────────────────────────────────── */
$('kaSlider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  phongUniforms.Ka.value = v;
  $('kaVal').textContent = v.toFixed(2);
});
$('kdSlider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  phongUniforms.Kd.value = v;
  $('kdVal').textContent = v.toFixed(2);
});
$('ksSlider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  phongUniforms.Ks.value = v;
  $('ksVal').textContent = v.toFixed(2);
});
$('shSlider').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  phongUniforms.shininess.value = v;
  $('shVal').textContent = Math.round(v);
});

/* ── Render loop + resize ───────────────────────────── */
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = sceneArea.offsetWidth, h = sceneArea.offsetHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
