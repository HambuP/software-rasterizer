<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barycentric Color Interpolation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0d0c0a; overflow: hidden; }
#wrap { width: 100%; height: 100%; position: relative; background: #0d0c0a; cursor: crosshair; }
canvas { display: block; }

#bottom {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  padding: 0 16px;
  pointer-events: none;
}

#controls {
  display: flex;
  justify-content: center;
  gap: 28px;
  align-items: center;
  flex-wrap: wrap;
  pointer-events: none;
}
#controls .group {
  display: flex;
  gap: 8px;
  align-items: center;
  pointer-events: auto;
}
#controls .caption {
  color: #7a6a55;
  font-family: monospace;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: 6px;
}
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: 1px solid #3a3020;
  background: transparent;
  color: #7a6a55;
  font-size: 13px;
  font-family: monospace;
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { color: #c8bba8; border-color: #4a3a2a; }
.btn.on {
  background: #c8894a;
  color: #0f0e0c;
  border-color: #c8894a;
}
.btn.on:hover { color: #0f0e0c; border-color: #c8894a; }
.chip {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  border: 1.5px solid #3a3020;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-weight: bold;
  font-size: 16px;
  transition: transform .12s, border-color .15s;
}
.chip:hover { transform: translateY(-2px); border-color: #c8894a; }
.chip span {
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7), 0 0 4px rgba(0, 0, 0, 0.45);
  pointer-events: none;
}
.hidden-picker {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

#info {
  color: #7a6a55;
  font-size: 14px;
  line-height: 1.7;
  font-family: monospace;
  pointer-events: none;
  text-align: center;
}
#info .key   { color: #e8c080; }
#info .form  { color: #c8bba8; }
#info .a     { color: #e05050; }
#info .b     { color: #50d050; }
#info .c     { color: #5080e0; }
</style>
</head>
<body>
<div id="wrap">
  <div id="bottom">
    <div id="controls">
      <div class="group">
        <span class="caption">Preset</span>
        <button class="btn on" data-preset="rgb">RGB</button>
        <button class="btn"    data-preset="warm">Warm</button>
        <button class="btn"    data-preset="cool">Cool</button>
      </div>
      <div class="group">
        <span class="caption">Vertex</span>
        <button class="chip" id="chipA" aria-label="Color of A"><span>A</span></button>
        <button class="chip" id="chipB" aria-label="Color of B"><span>B</span></button>
        <button class="chip" id="chipC" aria-label="Color of C"><span>C</span></button>
      </div>
      <input type="color" id="picker" class="hidden-picker">
    </div>
    <div id="info">
      <span class="form">Every pixel's color = <span class="a">λ₁·colorA</span> + <span class="b">λ₂·colorB</span> + <span class="c">λ₃·colorC</span></span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
/* Each vertex is position (normalized 0..1) + color (RGB 0..255).
   Positions get filled by setDefaultVertices() so the initial shape is
   always an equilateral triangle that fits the available area, regardless
   of viewport aspect ratio. After a drag, positions stay where the user put
   them (still normalized — they survive zoom but not extreme resizes). */
var A = { nx: 0, ny: 0, r: 224, g: 80,  b: 80  };
var B = { nx: 0, ny: 0, r: 80,  g: 208, b: 80  };
var C = { nx: 0, ny: 0, r: 80,  g: 128, b: 224 };

var presets = {
  rgb:  [{r:224,g:80,b:80},  {r:80,g:208,b:80},  {r:80,g:128,b:224}],
  warm: [{r:200,g:137,b:74}, {r:224,g:112,b:80}, {r:232,g:192,b:128}],
  cool: [{r:80,g:184,b:208}, {r:152,g:112,b:200},{r:80,g:176,b:144}],
};

var buffer;
var W = 0, H = 0;
var dragging = null;

var wrap     = document.getElementById('wrap');
var chipA    = document.getElementById('chipA');
var chipB    = document.getElementById('chipB');
var chipC    = document.getElementById('chipC');
var picker   = document.getElementById('picker');
var presetBtns = Array.from(document.querySelectorAll('[data-preset]'));

var pickingVertex = null;

function setup() {
  var c = createCanvas(wrap.offsetWidth, wrap.offsetHeight);
  c.parent(wrap);
  W = width; H = height;
  buffer = createGraphics(W, H);
  buffer.pixelDensity(1);             // critical: avoids retina-stride bug
  buffer.canvas.style.display = 'none';
  textFont('monospace');
  noLoop();
  setDefaultVertices();
  updateChips();
  renderBuffer();
}

function windowResized() {
  resizeCanvas(wrap.offsetWidth, wrap.offsetHeight);
  W = width; H = height;
  if (buffer) buffer.remove();
  buffer = createGraphics(W, H);
  buffer.pixelDensity(1);
  buffer.canvas.style.display = 'none';
  setDefaultVertices();
  renderBuffer();
  redraw();
}

/* Place A/B/C as an equilateral triangle that fits the available area
   between the top margin and the bottom controls — with comfortable padding
   on all sides so the handles don't hug the edges. */
function setDefaultVertices() {
  var topMargin = 30;
  var sideMargin = 44;
  var bottomEl = document.getElementById('bottom');
  var bottomReserved = bottomEl.offsetHeight + 36;

  var availW = W - 2 * sideMargin;
  var availH = H - topMargin - bottomReserved;
  if (availH < 80) availH = 80;
  if (availW < 80) availW = 80;

  // Pick equilateral dimensions that fit. Shrink to 92% so handles get air.
  var triH = availH * 0.92;
  var triW = triH * 2 / Math.sqrt(3);
  if (triW > availW * 0.92) {
    triW = availW * 0.92;
    triH = triW * Math.sqrt(3) / 2;
  }

  var cx = W / 2;
  var top = topMargin + (availH - triH) / 2;
  A.nx = cx / W;
  A.ny = top / H;
  B.nx = (cx + triW / 2) / W;
  B.ny = (top + triH)    / H;
  C.nx = (cx - triW / 2) / W;
  C.ny = (top + triH)    / H;
}

function pixelPos(v) { return { x: v.nx * W, y: v.ny * H }; }

/* Edge function: 2× signed area of triangle (p1, p2, p3). */
function edgeFn(p1x, p1y, p2x, p2y, p3x, p3y) {
  return (p2x - p1x) * (p3y - p1y) - (p2y - p1y) * (p3x - p1x);
}

/* Re-render the interpolated triangle into the offscreen buffer. Called
   whenever a vertex moves or a color changes — not per frame. Pineda-style
   incremental edge functions keep per-pixel cost to 3 adds + a sign check. */
function renderBuffer() {
  buffer.loadPixels();
  var px = buffer.pixels;

  // Clear to background
  for (var i = 0; i < px.length; i += 4) {
    px[i]   = 13;
    px[i+1] = 12;
    px[i+2] = 10;
    px[i+3] = 255;
  }

  var Apos = pixelPos(A), Bpos = pixelPos(B), Cpos = pixelPos(C);
  var Ax = Apos.x, Ay = Apos.y;
  var Bx = Bpos.x, By = Bpos.y;
  var Cx = Cpos.x, Cy = Cpos.y;

  var areaABC = edgeFn(Ax, Ay, Bx, By, Cx, Cy);
  if (Math.abs(areaABC) < 1) { buffer.updatePixels(); return; }
  var invArea = 1 / areaABC;
  var ccw = areaABC > 0;

  var xmin = Math.max(0,   Math.floor(Math.min(Ax, Bx, Cx)));
  var xmax = Math.min(W-1, Math.ceil( Math.max(Ax, Bx, Cx)));
  var ymin = Math.max(0,   Math.floor(Math.min(Ay, By, Cy)));
  var ymax = Math.min(H-1, Math.ceil( Math.max(Ay, By, Cy)));

  var dx1 = By - Cy, dy1 = Cx - Bx;
  var dx2 = Cy - Ay, dy2 = Ax - Cx;
  var dx3 = Ay - By, dy3 = Bx - Ax;

  var sx = xmin + 0.5, sy = ymin + 0.5;
  var w1Row = edgeFn(Bx, By, Cx, Cy, sx, sy);
  var w2Row = edgeFn(Cx, Cy, Ax, Ay, sx, sy);
  var w3Row = edgeFn(Ax, Ay, Bx, By, sx, sy);

  var Ar = A.r, Ag = A.g, Ab = A.b;
  var Br = B.r, Bg = B.g, Bb = B.b;
  var Cr = C.r, Cg = C.g, Cb = C.b;

  for (var y = ymin; y <= ymax; y++) {
    var w1 = w1Row, w2 = w2Row, w3 = w3Row;
    var rowBase = y * W;
    for (var x = xmin; x <= xmax; x++) {
      var inside = ccw
        ? (w1 >= 0 && w2 >= 0 && w3 >= 0)
        : (w1 <= 0 && w2 <= 0 && w3 <= 0);
      if (inside) {
        var l1 = w1 * invArea;
        var l2 = w2 * invArea;
        var l3 = w3 * invArea;
        var idx = (rowBase + x) * 4;
        px[idx]   = l1*Ar + l2*Br + l3*Cr;
        px[idx+1] = l1*Ag + l2*Bg + l3*Cg;
        px[idx+2] = l1*Ab + l2*Bb + l3*Cb;
      }
      w1 += dx1; w2 += dx2; w3 += dx3;
    }
    w1Row += dy1; w2Row += dy2; w3Row += dy3;
  }
  buffer.updatePixels();
}

function draw() {
  image(buffer, 0, 0);
  var Apos = pixelPos(A), Bpos = pixelPos(B), Cpos = pixelPos(C);
  drawVertexHandle(Apos, A, dragging === A);
  drawVertexHandle(Bpos, B, dragging === B);
  drawVertexHandle(Cpos, C, dragging === C);
  drawVertexLabel('A', Apos, Bpos, Cpos);
  drawVertexLabel('B', Bpos, Apos, Cpos);
  drawVertexLabel('C', Cpos, Apos, Bpos);
}

function drawVertexHandle(p, v, active) {
  if (active) {
    noFill();
    stroke(v.r, v.g, v.b, 130);
    strokeWeight(2);
    circle(p.x, p.y, 32);
  }
  stroke(13, 12, 10);
  strokeWeight(2.5);
  fill(v.r, v.g, v.b);
  circle(p.x, p.y, 20);   // 10px radius
}

function drawVertexLabel(txt, here, o1, o2) {
  // Push outward from the centroid of the OTHER two vertices
  var mx = (o1.x + o2.x) * 0.5;
  var my = (o1.y + o2.y) * 0.5;
  var dx = here.x - mx, dy = here.y - my;
  var L = Math.sqrt(dx*dx + dy*dy) || 1;
  var off = 28;
  var lx = here.x + (dx / L) * off;
  var ly = here.y + (dy / L) * off;

  // Dark disc backing for legibility against any color
  noStroke();
  fill(13, 12, 10, 215);
  circle(lx, ly, 24);

  fill(245, 235, 220);
  textSize(17);
  textStyle(BOLD);
  textAlign(CENTER, CENTER);
  text(txt, lx, ly + 1);
  textStyle(NORMAL);
  textAlign(LEFT, BASELINE);
}

/* ── Color picker plumbing ──────────────────────────────────── */
function luminance(c) { return 0.299 * c.r + 0.587 * c.g + 0.114 * c.b; }
function readableTextOn(c) { return luminance(c) > 140 ? '#0d0c0a' : '#f4ecd8'; }
function rgbStr(c) { return 'rgb(' + Math.round(c.r) + ',' + Math.round(c.g) + ',' + Math.round(c.b) + ')'; }
function colorToHex(c) {
  function h(v) { return Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0'); }
  return '#' + h(c.r) + h(c.g) + h(c.b);
}
function hexToColor(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  };
}

function updateChips() {
  chipA.style.background = rgbStr(A);
  chipB.style.background = rgbStr(B);
  chipC.style.background = rgbStr(C);
  chipA.style.color = readableTextOn(A);
  chipB.style.color = readableTextOn(B);
  chipC.style.color = readableTextOn(C);
}

function openPicker(vert, currentColor) {
  pickingVertex = vert;
  picker.value = colorToHex(currentColor);
  picker.click();
}

chipA.addEventListener('click', function() { openPicker('A', A); });
chipB.addEventListener('click', function() { openPicker('B', B); });
chipC.addEventListener('click', function() { openPicker('C', C); });

picker.addEventListener('input', function(e) {
  if (!pickingVertex) return;
  var c = hexToColor(e.target.value);
  var target = pickingVertex === 'A' ? A : pickingVertex === 'B' ? B : C;
  target.r = c.r; target.g = c.g; target.b = c.b;
  updateChips();
  presetBtns.forEach(function(b) { b.classList.remove('on'); });
  renderBuffer();
  redraw();
});

presetBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    var p = presets[btn.dataset.preset];
    A.r = p[0].r; A.g = p[0].g; A.b = p[0].b;
    B.r = p[1].r; B.g = p[1].g; B.b = p[1].b;
    C.r = p[2].r; C.g = p[2].g; C.b = p[2].b;
    updateChips();
    presetBtns.forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on');
    renderBuffer();
    redraw();
  });
});

/* ── Drag handling ──────────────────────────────────────────── */
function hitTest(mx, my) {
  var items = [A, B, C];
  var best = null, bestD = 26 * 26;
  for (var i = 0; i < items.length; i++) {
    var p = pixelPos(items[i]);
    var dx = mx - p.x, dy = my - p.y;
    var d2 = dx*dx + dy*dy;
    if (d2 < bestD) { bestD = d2; best = items[i]; }
  }
  return best;
}

function getLocalXY(clientX, clientY) {
  var rect = wrap.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function applyConstraints(v) {
  var topMargin    = 20;
  var sideMargin   = 20;
  var bottomEl     = document.getElementById('bottom');
  var bottomLimit  = bottomEl.offsetHeight + 28;
  v.nx = constrain(v.nx, sideMargin / W, 1 - sideMargin / W);
  v.ny = constrain(v.ny, topMargin  / H, (H - bottomLimit) / H);
}

/* Schedule a render at most once per animation frame, so fast drags don't
   queue up duplicate work. */
var pendingRender = false;
function scheduleRender() {
  if (pendingRender) return;
  pendingRender = true;
  requestAnimationFrame(function() {
    renderBuffer();
    redraw();
    pendingRender = false;
  });
}

wrap.addEventListener('mousedown', function(e) {
  if (e.target.tagName !== 'CANVAS') return;  // don't hijack button/chip clicks
  var l = getLocalXY(e.clientX, e.clientY);
  dragging = hitTest(l.x, l.y);
  if (dragging) e.preventDefault();
});
window.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var l = getLocalXY(e.clientX, e.clientY);
  dragging.nx = l.x / W;
  dragging.ny = l.y / H;
  applyConstraints(dragging);
  scheduleRender();
});
window.addEventListener('mouseup', function() { dragging = null; });

wrap.addEventListener('touchstart', function(e) {
  if (e.target.tagName !== 'CANVAS') return;
  if (e.touches.length === 0) return;
  var l = getLocalXY(e.touches[0].clientX, e.touches[0].clientY);
  dragging = hitTest(l.x, l.y);
  if (dragging) e.preventDefault();
}, { passive: false });
wrap.addEventListener('touchmove', function(e) {
  if (!dragging || e.touches.length === 0) return;
  var l = getLocalXY(e.touches[0].clientX, e.touches[0].clientY);
  dragging.nx = l.x / W;
  dragging.ny = l.y / H;
  applyConstraints(dragging);
  scheduleRender();
  e.preventDefault();
}, { passive: false });
wrap.addEventListener('touchend',    function() { dragging = null; });
wrap.addEventListener('touchcancel', function() { dragging = null; });
</script>
</body>
</html>
